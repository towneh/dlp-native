name: Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Windows x64 ─────────────────────────────────────────────────────────────
  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build
        run: pwsh scripts/build-host.ps1

      - name: CLI smoke test
        run: cargo run -p unity_dlp_cli --release -- version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity_dlp-windows-x64
          path: unity_package/Plugins/x86_64/unity_dlp.dll

  # ── macOS universal ──────────────────────────────────────────────────────────
  macos:
    name: macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # actions/setup-python on macos-latest installs a universal2 Python 3.12,
      # which PyO3 can use for both the native arm64 and the x86_64 cross-compile.
      - name: Install Python 3.12 (universal2)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export PYO3_PYTHON
        run: echo "PYO3_PYTHON=$(python3 -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Install uv (for hatch_build.py in build.rs)
        uses: astral-sh/setup-uv@v5

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build universal dylib
        run: bash scripts/build-macos-universal.sh

      - name: CLI smoke test
        run: cargo run -p unity_dlp_cli --release -- version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity_dlp-macos-universal
          path: unity_package/Plugins/x86_64/unity_dlp.dylib

  # ── Linux x64 ───────────────────────────────────────────────────────────────
  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build
        run: bash scripts/build-host.sh

      - name: CLI smoke test
        run: cargo run -p unity_dlp_cli --release -- version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity_dlp-linux-x64
          path: unity_package/Plugins/x86_64/libunity_dlp.so

  # ── Android arm64-v8a ────────────────────────────────────────────────────────
  # armeabi-v7a is omitted: python-build-standalone has no armv7-android target.
  android:
    name: Android arm64-v8a
    runs-on: ubuntu-latest
    env:
      PYO3_CROSS_PYTHON_VERSION: '3.12'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Android NDK r27c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Export ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Install Rust target
        run: rustup target add aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Cache Python for Android arm64
        id: cache-py-android
        uses: actions/cache@v4
        with:
          path: python-android-arm64
          key: python-3.12.9-android-arm64-20250409

      - name: Download Python 3.12 for Android arm64 (indygreg/python-build-standalone)
        if: steps.cache-py-android.outputs.cache-hit != 'true'
        run: |
          FILE="cpython-3.12.9+20250409-aarch64-unknown-linux-android-lto-full.tar.zst"
          curl -fsSL -o "$FILE" \
            "https://github.com/indygreg/python-build-standalone/releases/download/20250409/${FILE}"
          mkdir python-android-arm64
          tar --use-compress-program=zstd -xf "$FILE" -C python-android-arm64 --strip-components=1

      - name: Export PYO3_CROSS_LIB_DIR
        run: echo "PYO3_CROSS_LIB_DIR=$(pwd)/python-android-arm64/install/lib" >> "$GITHUB_ENV"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Build Android arm64-v8a
        run: |
          cargo ndk \
            --target aarch64-linux-android \
            --platform 26 \
            -- build -p unity_dlp_core --release

      - name: Stage artifact
        run: |
          mkdir -p unity_package/Plugins/Android/libs/arm64-v8a
          cp target/aarch64-linux-android/release/libunity_dlp.so \
             unity_package/Plugins/Android/libs/arm64-v8a/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity_dlp-android-arm64
          path: unity_package/Plugins/Android/libs/arm64-v8a/libunity_dlp.so

  # ── iOS arm64 ────────────────────────────────────────────────────────────────
  ios:
    name: iOS arm64
    runs-on: macos-latest
    env:
      PYO3_CROSS_PYTHON_VERSION: '3.12'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Cache Python for iOS arm64 (python-apple-support)
        id: cache-py-ios
        uses: actions/cache@v4
        with:
          path: python-ios
          key: python-3.12-ios-support-b9

      - name: Download Python 3.12 for iOS (BeeWare python-apple-support)
        if: steps.cache-py-ios.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o Python-3.12-iOS-support.b9.tar.gz \
            "https://github.com/beeware/python-apple-support/releases/download/3.12-b9/Python-3.12-iOS-support.b9.tar.gz"
          mkdir python-ios
          tar -xzf Python-3.12-iOS-support.b9.tar.gz -C python-ios

      # python-apple-support ships Python.xcframework; PyO3 wants a lib dir with
      # libpython3.12.a. Create a shim directory with the right name.
      - name: Set up PYO3_CROSS_LIB_DIR for iOS arm64
        run: |
          FRAMEWORK="$(pwd)/python-ios/Python.xcframework/ios-arm64/Python.framework"
          mkdir -p python-ios-lib
          cp "${FRAMEWORK}/Python" python-ios-lib/libpython3.12.a
          echo "PYO3_CROSS_LIB_DIR=$(pwd)/python-ios-lib" >> "$GITHUB_ENV"
          # Headers live inside the framework
          echo "CFLAGS=-I${FRAMEWORK}/Headers" >> "$GITHUB_ENV"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ios-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ios-cargo-

      - name: Build iOS device (arm64)
        run: |
          export SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          cargo build -p unity_dlp_core --release --target aarch64-apple-ios

      - name: Stage artifact
        run: |
          mkdir -p unity_package/Plugins/iOS
          cp target/aarch64-apple-ios/release/libunity_dlp.a unity_package/Plugins/iOS/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity_dlp-ios-arm64
          path: unity_package/Plugins/iOS/libunity_dlp.a
