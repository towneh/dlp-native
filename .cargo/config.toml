# V8's prebuilt static library for Linux uses thread-local storage with the
# local-exec TLS model (R_X86_64_TPOFF32 / R_AARCH64_TLSLE_*), which Rust's
# bundled LLD (the default since ~1.80) rejects when building a cdylib.
# Force ld.bfd, which is more permissive about TLS relocations in shared objects,
# and pass -z,notext to allow remaining non-PIC relocations from the V8 archive.
[target.x86_64-unknown-linux-gnu]
linker = "gcc"
rustflags = ["-C", "link-arg=-fuse-ld=bfd", "-C", "link-arg=-Wl,-z,notext"]
